const state = {};
const phaseOpen = {};
let currentEvent = 0;

function getKey(eid, pi, ci) { return eid + '_' + pi + '_' + ci; }

function calcProgress(ev) {
  let total = 0, checked = 0;
  ev.phases.forEach((p, pi) => {
    p.items.forEach((_, ci) => {
      total++;
      if (state[getKey(ev.id, pi, ci)]) checked++;
    });
  });
  return total ? Math.round(checked / total * 100) : 0;
}

function renderTabs() {
  const container = document.getElementById('event-tabs');
  container.innerHTML = events.map((ev, i) => {
    const pct = calcProgress(ev);
    return `<div class="event-tab ${i === currentEvent ? 'active' : ''}" onclick="setEvent(${i})" style="${i === currentEvent ? 'border-bottom-color:' + ev.color + ';color:' + ev.color : ''}">
      ${ev.name} ${pct > 0 ? '<span style="font-size:10px;opacity:.7">(' + pct + '%)</span>' : ''}
    </div>`;
  }).join('');
}

function renderContent() {
  const ev = events[currentEvent];
  const pct = calcProgress(ev);
  const container = document.getElementById('main-content');

  const phasesHTML = ev.phases.map((phase, pi) => {
    const phaseKey = ev.id + '_' + pi;
    const isOpen = phaseOpen[phaseKey] !== false;
    const checked = phase.items.filter((_, ci) => state[getKey(ev.id, pi, ci)]).length;
    const allDone = checked === phase.items.length;

    return `<div class="phase-card">
      <div class="phase-head" onclick="togglePhase('${phaseKey}')">
        <div class="phase-left">
          <div class="phase-dot" style="background:${phase.color}"></div>
          <div>
            <div class="phase-title">${phase.title}</div>
          </div>
        </div>
        <div class="phase-right">
          <span class="phase-badge ${allDone ? 'done' : ''}">${checked} / ${phase.items.length}</span>
          <span class="chevron ${isOpen ? 'open' : ''}">▶</span>
        </div>
      </div>
      <div class="phase-body ${isOpen ? 'open' : ''}">
        ${phase.items.map((item, ci) => {
          const key = getKey(ev.id, pi, ci);
          const tagHTML = item.tag === 'safety' ? '<span class="tag tag-safety">안전</span>' :
                          item.tag === 'doc' ? '<span class="tag tag-doc">문서</span>' :
                          item.tag === 'key' ? '<span class="tag tag-key">핵심</span>' : '';
          return `<div class="check-row" onclick="toggleCheck('${key}')">
            <div class="check-box ${state[key] ? 'checked' : ''}">
              <svg class="check-mark" width="10" height="10" viewBox="0 0 10 10" fill="none">
                <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="check-text ${state[key] ? 'done' : ''}">${item.text}</span>
            ${tagHTML}
          </div>`;
        }).join('')}
        <div class="memo-box">
          <textarea class="memo-input" placeholder="이 단계 메모·결정 사항" rows="1" onclick="event.stopPropagation()"></textarea>
        </div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="event-header">
      <div class="event-title" style="color:${ev.color}">${ev.name}</div>
      <div class="event-desc">${ev.desc}</div>
      <div class="event-meta">
        <div class="meta-card"><div class="meta-label">행사 날짜</div><input class="meta-input" placeholder="날짜 입력"></div>
        <div class="meta-card"><div class="meta-label">장소</div><input class="meta-input" placeholder="장소 입력"></div>
        <div class="meta-card"><div class="meta-label">총괄 담당</div><input class="meta-input" placeholder="이름 입력"></div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-row">
        <span class="progress-label">전체 진행률</span>
        <span class="progress-pct" style="color:${ev.color}">${pct}%</span>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${ev.color}"></div></div>
    </div>
    ${phasesHTML}
    <div class="review-box">
      <div class="review-title">행사 후 회고</div>
      <div class="review-grid">
        <div class="review-field">
          <div class="review-label">참석 인원</div>
          <input class="review-input" placeholder="___명">
        </div>
        <div class="review-field">
          <div class="review-label">성공 기준 달성 여부</div>
          <input class="review-input" placeholder="예) 새친구 5명 / 장결 0명">
        </div>
        <div class="review-field">
          <div class="review-label">잘 된 것 2가지</div>
          <input class="review-input" placeholder="1) 2)">
        </div>
        <div class="review-field">
          <div class="review-label">아쉬운 것 2가지</div>
          <input class="review-input" placeholder="1) 2)">
        </div>
      </div>
      <div class="review-field" style="margin-top:10px;">
        <div class="review-label">내년에 바꿀 것 1가지</div>
        <input class="review-input" placeholder="다음 해 복제 시 수정할 내용">
      </div>
    </div>
    <div class="action-bar">
      <button class="btn btn-danger" onclick="resetEvent('${ev.id}')">이 행사 초기화</button>
    </div>
  `;
}

function setEvent(i) {
  currentEvent = i;
  renderTabs();
  renderContent();
}

function togglePhase(key) {
  phaseOpen[key] = phaseOpen[key] === false ? true : false;
  renderContent();
}

function toggleCheck(key) {
  state[key] = !state[key];
  localStorage.setItem('event_state', JSON.stringify(state));
  renderTabs();
  renderContent();
}

function resetEvent(eid) {
  if (!confirm('이 행사 체크리스트를 초기화할까요?')) return;
  Object.keys(state).filter(k => k.startsWith(eid)).forEach(k => delete state[k]);
  localStorage.setItem('event_state', JSON.stringify(state));
  renderTabs();
  renderContent();
}

const saved = localStorage.getItem('event_state');
if (saved) Object.assign(state, JSON.parse(saved));

renderTabs();
renderContent();
</script>
